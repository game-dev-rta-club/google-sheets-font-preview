<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      :root {
        --bg: #f7f5f0;
        --panel: #fffdf8;
        --line: #d9d1c4;
        --text: #26231d;
        --subtle: #736b61;
        --accent: #2b6f5e;
        --accent-soft: #e2f0eb;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        padding: 14px;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
      }

      .title {
        font-size: 13px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .meta {
        display: grid;
        gap: 4px;
        font-size: 12px;
        color: var(--subtle);
      }

      .dropzone {
        border: 2px dashed var(--line);
        border-radius: 12px;
        background: #fff;
        padding: 16px 12px;
        text-align: center;
        transition: border-color 120ms ease, background 120ms ease;
      }

      .dropzone.dragover {
        border-color: var(--accent);
        background: var(--accent-soft);
      }

      .dropzone strong {
        display: block;
        margin-bottom: 4px;
        font-size: 13px;
      }

      .dropzone p {
        margin: 0;
        font-size: 12px;
        color: var(--subtle);
        line-height: 1.5;
      }

      .hidden-input {
        display: none;
      }

      .button-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }

      button {
        appearance: none;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--text);
        border-radius: 999px;
        padding: 7px 12px;
        font-size: 12px;
        cursor: pointer;
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #fff;
      }

      .preview {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 12px;
        min-height: 180px;
        padding: 16px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.6;
        font-size: 26px;
      }

      .status {
        font-size: 12px;
        color: var(--subtle);
      }

      .status.error {
        color: #a6382f;
      }

      .font-name {
        font-size: 12px;
        color: var(--subtle);
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <section class="card">
        <h1 class="title">Selected Cell</h1>
        <div id="meta" class="meta">
          <div>Loading...</div>
        </div>
      </section>

      <section class="card">
        <h2 class="title">Font Preview</h2>
        <div id="dropzone" class="dropzone" tabindex="0" role="button">
          <strong>Drop a font here</strong>
          <p>Supports .ttf / .otf / .woff / .woff2</p>
          <p>The file stays in this sidebar only and is not uploaded.</p>
        </div>
        <input
          id="fontInput"
          class="hidden-input"
          type="file"
          accept=".ttf,.otf,.woff,.woff2,font/ttf,font/otf,font/woff,font/woff2"
        />
        <div class="button-row">
          <button id="pickButton" class="primary" type="button">Choose Font</button>
          <button id="clearButton" type="button">Clear Font</button>
        </div>
        <div id="fontName" class="font-name">Using browser default font.</div>
      </section>

      <section class="card">
        <h2 class="title">Preview</h2>
        <div id="preview" class="preview">Loading...</div>
      </section>

      <div id="status" class="status"></div>
    </div>

    <script>
      const previewEl = document.getElementById('preview');
      const metaEl = document.getElementById('meta');
      const statusEl = document.getElementById('status');
      const dropzoneEl = document.getElementById('dropzone');
      const fontInputEl = document.getElementById('fontInput');
      const pickButtonEl = document.getElementById('pickButton');
      const clearButtonEl = document.getElementById('clearButton');
      const fontNameEl = document.getElementById('fontName');

      let pollingTimer = null;
      let currentFontFamily = '';
      let currentFontObject = null;
      let lastSignature = '';

      function setStatus(message, isError) {
        statusEl.textContent = message || '';
        statusEl.className = isError ? 'status error' : 'status';
      }

      function renderSelection(data) {
        metaEl.innerHTML = '';

        const metaLines = [
          `${data.spreadsheetName}`,
          `${data.sheetName} / ${data.a1Notation}`,
          `Row ${data.row}, Column ${data.column}`,
        ];

        metaLines.forEach((line) => {
          const div = document.createElement('div');
          div.textContent = line;
          metaEl.appendChild(div);
        });

        previewEl.textContent = data.text || '';
      }

      function refreshSelection() {
        google.script.run
          .withSuccessHandler((response) => {
            if (!response || !response.ok) {
              setStatus(response && response.message ? response.message : 'Failed to load selected cell.', true);
              return;
            }

            const nextSignature = [
              response.sheetName,
              response.a1Notation,
              response.text,
            ].join('::');

            if (nextSignature !== lastSignature) {
              renderSelection(response);
              lastSignature = nextSignature;
            }

            setStatus('');
          })
          .withFailureHandler((error) => {
            setStatus(error && error.message ? error.message : 'Failed to load selected cell.', true);
          })
          .getPreviewState();
      }

      async function loadFontFile(file) {
        if (!file) {
          return;
        }

        try {
          const family = `LocalPreviewFont_${Date.now()}`;
          const buffer = await file.arrayBuffer();
          const fontFace = new FontFace(family, buffer);
          await fontFace.load();
          document.fonts.add(fontFace);

          if (currentFontObject) {
            document.fonts.delete(currentFontObject);
          }

          currentFontFamily = family;
          currentFontObject = fontFace;
          previewEl.style.fontFamily = `"${family}"`;
          fontNameEl.textContent = `Loaded: ${file.name}`;
          setStatus('');
        } catch (error) {
          setStatus(`Font load failed: ${error && error.message ? error.message : error}`, true);
        }
      }

      function clearFont() {
        if (currentFontObject) {
          document.fonts.delete(currentFontObject);
        }

        currentFontFamily = '';
        currentFontObject = null;
        previewEl.style.fontFamily = '';
        fontNameEl.textContent = 'Using browser default font.';
        setStatus('');
      }

      function preventDefaults(event) {
        event.preventDefault();
        event.stopPropagation();
      }

      ['dragenter', 'dragover', 'dragleave', 'drop'].forEach((eventName) => {
        dropzoneEl.addEventListener(eventName, preventDefaults);
      });

      ['dragenter', 'dragover'].forEach((eventName) => {
        dropzoneEl.addEventListener(eventName, () => {
          dropzoneEl.classList.add('dragover');
        });
      });

      ['dragleave', 'drop'].forEach((eventName) => {
        dropzoneEl.addEventListener(eventName, () => {
          dropzoneEl.classList.remove('dragover');
        });
      });

      dropzoneEl.addEventListener('drop', (event) => {
        const files = event.dataTransfer && event.dataTransfer.files;
        if (files && files.length > 0) {
          loadFontFile(files[0]);
        }
      });

      dropzoneEl.addEventListener('click', () => {
        fontInputEl.click();
      });

      pickButtonEl.addEventListener('click', () => {
        fontInputEl.click();
      });

      clearButtonEl.addEventListener('click', () => {
        clearFont();
      });

      fontInputEl.addEventListener('change', (event) => {
        const files = event.target.files;
        if (files && files.length > 0) {
          loadFontFile(files[0]);
        }
      });

      function startPolling() {
        refreshSelection();
        pollingTimer = window.setInterval(refreshSelection, 250);
      }

      startPolling();
    </script>
  </body>
</html>
